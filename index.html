<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#B54A32">
<meta name="description" content="Mom's Canyon Trip 2026 — everything you need to know">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="apple-touch-icon" href="assets/icon.svg">
<title>Mom's Canyon Trip 2026</title>
<link rel="stylesheet" href="lib/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-row">
    <button class="icon-btn" onclick="toggleAuditScreen()" aria-label="Trip audit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    </button>
    <div class="header-center">
      <div class="header-title" id="headerTitle">Canyon Trip</div>
      <div class="header-sub">
        <span id="liveClock" class="live-clock">—</span>
        <button class="today-btn" onclick="goToToday()" aria-label="Go to today">Today</button>
        <span id="headerSub"></span>
      </div>
    </div>
    <button class="icon-btn checklist-btn" onclick="togglePretripChecklist()" aria-label="Pre-trip checklist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12l2 2 4-4"/></svg>
      <span class="checklist-badge" id="checklistBadge" hidden></span>
    </button>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</header>

<nav class="day-nav" id="dayPicker" aria-label="Day picker"></nav>

<main class="main" id="app"></main>

<div class="audio-bar" id="audioBar" hidden>
  <div class="audio-inner">
    <button class="audio-ctrl" id="audioPlayPause" onclick="toggleAudio()" aria-label="Pause or resume">⏸</button>
    <div class="audio-label" id="audioText">Listening…</div>
    <button class="audio-ctrl" onclick="stopAudio()" aria-label="Stop">⏹</button>
  </div>
</div>

<nav class="nav-footer" aria-label="Day navigation">
  <button class="nav-btn prev" id="prevBtn" onclick="prevDay()" aria-label="Previous day"></button>
  <button class="nav-btn next" id="nextBtn" onclick="nextDay()" aria-label="Next day"></button>
</nav>

<script defer src="lib/leaflet.js"></script>
<script defer src="js/i18n.js"></script>
<script defer src="js/data.js"></script>
<script defer src="js/guides.js"></script>
<script defer src="js/guide-fallbacks.js"></script>
<script defer src="js/nearby.js"></script>
<script defer src="js/alltrails-slugs.js"></script>
<script defer src="js/hazards.js"></script>
<script defer src="js/weather.js"></script>
<script defer src="js/app.js"></script>
<script defer src="js/render.js"></script>
<script defer src="js/guide.js"></script>
<script defer src="js/wizard.js"></script>
<script>
// Service worker provides offline support for mom on the trip. Skip registration
// during local development — cache-first behavior was hiding live edits and
// making debugging painful. Also auto-unregister any SW that previously installed
// itself locally so a stale dev cache can't keep haunting the page.
const isDev = /^(localhost|127\.0\.0\.1|0\.0\.0\.0)$/i.test(location.hostname);
if ('serviceWorker' in navigator) {
  if (isDev) {
    navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
    if ('caches' in window) caches.keys().then(ks => ks.forEach(k => caches.delete(k)));
  } else {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
}
</script>
</body>
</html>
