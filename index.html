<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#B54A32">
<meta name="description" content="טיול הקניונים 2026 — כל מה שצריך לדעת">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="apple-touch-icon" href="assets/icon.svg">
<title>טיול הקניונים 2026</title>
<link rel="stylesheet" href="lib/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-row">
    <button class="icon-btn" onclick="toggleAuditScreen()" aria-label="בדיקת מסלול">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    </button>
    <div class="header-center">
      <div class="header-title" id="headerTitle">טיול הקניונים</div>
      <div class="header-sub" id="headerSub"></div>
    </div>
    <div style="width:48px" aria-hidden="true"></div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</header>

<nav class="day-nav" id="dayPicker" aria-label="בחירת יום"></nav>

<main class="main" id="app"></main>

<div class="audio-bar" id="audioBar" hidden>
  <div class="audio-inner">
    <button class="audio-ctrl" id="audioPlayPause" onclick="toggleAudio()" aria-label="השהה או המשך הקראה">⏸</button>
    <div class="audio-label" id="audioText">מקשיבה...</div>
    <button class="audio-ctrl" onclick="stopAudio()" aria-label="עצור הקראה">⏹</button>
  </div>
</div>

<nav class="nav-footer" aria-label="מעבר בין ימים">
  <button class="nav-btn prev" id="prevBtn" onclick="prevDay()" aria-label="יום קודם"></button>
  <button class="nav-btn next" id="nextBtn" onclick="nextDay()" aria-label="יום הבא"></button>
</nav>

<script defer src="lib/leaflet.js"></script>
<script defer src="js/i18n.js"></script>
<script defer src="js/data.js"></script>
<script defer src="js/weather.js"></script>
<script defer src="js/app.js"></script>
<script defer src="js/render.js"></script>
<script defer src="js/guide.js"></script>
<script defer src="js/wizard.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
